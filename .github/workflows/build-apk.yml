name: Gerar APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Conferir arquivos do app
        run: |
          test -f android/app/src/main/assets/index.html
          test -f android/app/src/main/assets/style.css
          test -f android/app/src/main/assets/script.js

      - name: Gerar APK debug
        working-directory: android
        run: gradle :app:assembleDebug

      - name: Enviar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: Bankroll-Poker-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
