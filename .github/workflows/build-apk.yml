name: Gerar APK

on:
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar arquivos do repositorio
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Copiar site para o app Android
        run: |
          mkdir -p android/app/src/main/assets
          cp index.html style.css script.js manifest.json sw.js icon.svg android/app/src/main/assets/

      - name: Gerar APK debug
        working-directory: android
        run: gradle :app:assembleDebug

      - name: Enviar APK para download
        uses: actions/upload-artifact@v4
        with:
          name: Bankroll-Poker-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
